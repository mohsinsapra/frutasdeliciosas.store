<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Green banner background, like the shop sign -->
  <rect width="100" height="100" rx="24" fill="#2E8B3E"/>
  <rect x="6" y="6" width="88" height="88" rx="19" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.85"/>
  <!-- FD monogram in bold white, sign-style -->
  <text x="50" y="62" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">FD</text>
  <!-- Fruit accents: orange and tomato-red dots with a leaf -->
  <circle cx="35" cy="80" r="6" fill="#F28C28"/>
  <circle cx="50" cy="82" r="6" fill="#D93B2B"/>
  <circle cx="65" cy="80" r="6" fill="#8BC34A"/>
  <path d="M50 76 q3 -5 7 -6 q-2 5 -7 6 Z" fill="#2E8B3E" stroke="#ffffff" stroke-width="1"/>
</svg>
